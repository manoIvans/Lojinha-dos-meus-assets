<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Press Start 2P: fonte bitmap baseada no sistema do NES.
         Usada só no logo/título da marca (não em texto corrido — Press
         Start 2P só tem uppercase e é pesada para parágrafos). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <!-- Preconnect com o backend warmup o handshake (DNS + TCP + TLS)
         ANTES do primeiro fetch JS. Sem isso, o request inicial de
         /api/v1/assets paga ~50-200ms de latência de conexão.
         %VITE_API_BASE_URL% é expandido no build do Vite a partir do .env. -->
    <link rel="preconnect" href="%VITE_API_BASE_URL%" crossorigin />
    <title>ManoMesh — Mercado de assets 3D</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
